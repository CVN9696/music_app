<!DOCTYPE html>
<html>
<head>
    <title>My Music App</title>
    <style>
        body {
            font-family: Arial;
            background-color: #111;
            color: white;
            text-align: center;
        }
        h1 {
            color: #1db954;
        }
        .song {
            margin: 20px;
        }
        audio {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🎵 My Music Website</h1>

    <div class="song">
        <h3>Song 1</h3>
        <audio controls>
            <source src="song1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="song">
        <h3>Song 2</h3>
        <audio controls>
            <source src="song2.mp3" type="audio/mpeg">
        </audio>
    </div>

</body>
</html>
